services:
  web:
    build: .
    command: python app.py --port 5050
    ports:
      - "5050:5050"
    environment:
      - DB_PATH=/app/data/tpp.db
      - MODEL_PATH=/app/models/trained_model.pkl
    volumes:
      - tpp_data:/app/data

  streamlit:
    build: .
    command: >
      streamlit run streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DB_PATH=/app/data/tpp.db
      - MODEL_PATH=/app/models/trained_model.pkl
    volumes:
      - tpp_data:/app/data
    depends_on:
      - web

volumes:
  tpp_data:
